name: clang-format

on: [push, pull_request]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: clang-format
        run: |
          CLANG_FORMAT=$(command -v clang-format-20 || command -v clang-format-19 || command -v clang-format-18 || echo "")
          if [ -z "$CLANG_FORMAT" ]; then
            echo "No clang-format found, installing..."
            wget -qO - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
            sudo add-apt-repository -y "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-20 main"
            sudo apt-get update -qq && sudo apt-get install -y -qq clang-format-20
            CLANG_FORMAT=$(command -v clang-format-20)
          fi
          echo "Using: $CLANG_FORMAT ($($CLANG_FORMAT --version))"
          find . -name '*.cpp' -o -name '*.hpp' -o -name '*.h' -o -name '*.cc' -o -name '*.cxx' \
            | xargs "$CLANG_FORMAT" --style=file --dry-run --Werror
